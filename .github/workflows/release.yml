name: Release

# Cuts a GitHub release whenever `version` in gradle.properties names a tag that
# doesn't exist yet. Bump the version and push to main to ship; pushes that
# don't change the version no-op. Also runnable on demand via "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      release_exists: ${{ steps.exists.outputs.exists }}
      has_central: ${{ steps.guard.outputs.has_central }}
    steps:
      - uses: actions/checkout@v4

      - name: Read project version
        id: ver
        run: echo "version=$(grep '^version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Check whether this release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.ver.outputs.version }} already exists - nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Gate the Maven Central publish on the credentials existing, so releases
      # keep working before the one-time Central setup is done (see PUBLISHING.md).
      # secrets can't be read in a job-level `if`, so surface presence as an output.
      - name: Detect Central Portal credentials
        id: guard
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
        run: |
          if [ -n "$CENTRAL_PORTAL_USERNAME" ]; then
            echo "has_central=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_central=false" >> "$GITHUB_OUTPUT"
            echo "CENTRAL_PORTAL_USERNAME not set - the Maven Central publish will be skipped."
          fi

      - name: Set up JDK 21
        if: steps.exists.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        if: steps.exists.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Build (tests + both jars)
        if: steps.exists.outputs.exists == 'false'
        run: ./gradlew build --no-daemon --stacktrace

      - name: Stage release assets
        if: steps.exists.outputs.exists == 'false'
        run: |
          v="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          # Stable, version-less asset names so the SpigotMC "external download"
          # link can point at /releases/latest/download/<name> permanently.
          cp "spyglass/build/libs/Spyglass-${v}.jar"        "dist/Spyglass.jar"
          cp "spyglass/build/libs/Spyglass-${v}-shaded.jar" "dist/Spyglass-shaded.jar"
          cp "spyglass-velocity/build/libs/Spyglass-Velocity-${v}.jar" "dist/Spyglass-Velocity.jar"
          {
            echo "**Spyglass v${v}** - forensic logging & rollback for Paper 1.21.x (Java 21)."
            echo
            # Brief "what was fixed" summary, maintained per release in this file.
            if [ -f .github/release-notes.md ]; then
              echo "### What's fixed"
              echo
              cat .github/release-notes.md
              echo
            fi
            echo "### Downloads"
            echo "- **\`Spyglass.jar\`** (recommended) - lean build. Paper's library loader"
            echo "  downloads its database driver, command framework, and config libs from"
            echo "  Maven Central on first start (needs outbound internet once; cached under"
            echo "  \`<server>/libraries/\`)."
            echo "- **\`Spyglass-shaded.jar\`** - fat fallback with every dependency bundled."
            echo "  Use it if your host blocks outbound network at boot, or you hit a"
            echo "  library-loader issue. Identical behavior, larger file."
            echo "- **\`Spyglass-Velocity.jar\`** - optional Velocity proxy companion for"
            echo "  cross-server search. Read-only: never writes records, never rolls back."
            echo "  Install on the proxy only if you run a Velocity network; a standalone"
            echo "  Paper server doesn't need it."
          } > dist/NOTES.md

      - name: Create release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            dist/Spyglass.jar dist/Spyglass-shaded.jar dist/Spyglass-Velocity.jar \
            --title "Spyglass ${{ steps.ver.outputs.version }}" \
            --notes-file dist/NOTES.md

  # Publishes spyglass-api (Apache-2.0) to Maven Central, aligned with the
  # GitHub release above. Runs only when a new release was just cut and the
  # Central credentials are configured; otherwise it is skipped, not failed.
  # One-time setup (account, namespace, signing key, secrets) is in PUBLISHING.md.
  publish-maven-central:
    needs: release
    if: needs.release.outputs.release_exists == 'false' && needs.release.outputs.has_central == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish spyglass-api to Maven Central
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAggregationToCentralPortal --no-daemon --stacktrace
