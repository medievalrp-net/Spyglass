# Spyglass CoreProtect import sources — LIVE MYSQL ONLY.
#
# This file is SEPARATE from config.conf on purpose. Nothing here changes
# where Spyglass stores its own data; these are read-only credentials for a
# CoreProtect MySQL database you want to import FROM, used by:
#
#   /spyglass import mysql <source-name>
#
# SQLite imports need no config — drop the .db file in plugins/Spyglass/import/
# and run: /spyglass import <file>
#
# sources {
#   old-survival {
#     host = "10.0.0.5"
#     port = 3306
#     database = "coreprotect"
#     user = "spyglass_reader"   # only needs SELECT on the co_* tables
#     password = "changeme"
#     # server-name = "survival" # optional; defaults to this server's name
#   }
# }
sources {}
