database {
  # Which backend stores Spyglass data. Pick one — operators run
  # either MongoDB or ClickHouse, not both. The chosen backend stores
  # the primary EventRecord stream AND the auxiliary UndoHistory /
  # Tools collections; the unused backend block is ignored.
  #
  # "mongo"      — MongoDB; production-tested default.
  # "clickhouse" — ClickHouse; columnar, ~3-4x storage compression,
  #                ~10x faster on full-table analytics, ~5-15x slower
  #                on per-player /spyglass search lookups (architectural
  #                trade-off — sparse primary index vs. B-tree).
  backend = "mongo"

  # The defaults below assume the database lives on THIS host. Before
  # pointing them at another machine (shared store, Velocity search),
  # secure it: auth + least-privilege user, TLS or a private network,
  # firewalled ports, and minimum patched server versions.

  # Mongo connection (used when backend = "mongo").
  uri = "mongodb://localhost:27017"
  name = "Spyglass"            # database name
  collection = "EventRecords"  # main event collection (others are derived from it)

  # ClickHouse connection (used when backend = "clickhouse").
  clickhouse {
    host = "localhost"       # ClickHouse host serving the HTTP interface
    port = 8123              # HTTP port (8123 is the default; the native 9000 port is not used)
    database = "spyglass"    # database name; auto-created on first start if missing
    table = "event_records"  # main event table; auto-created and migrated on first start
    user = "default"         # ClickHouse user
    password = ""            # password for that user ("" = none)
    ssl = false              # true to connect over HTTPS/TLS instead of plain HTTP
  }
}

storage {
  # How aggressive the recorder is about surviving hard JVM crashes.
  #
  #   "ram"          (default) — in-memory queue only. Fast. If the
  #                  server crashes, anything between event-fired and
  #                  database-acked is gone. Typical loss window:
  #                  the last ~250 ms of events. Fine for community
  #                  servers; the same exposure CoreProtect and
  #                  v1 have always had.
  #
  #   "wal-batched"  — append-only write-ahead log. Each drain batch
  #                  is fsynced to disk before going to the database;
  #                  the file is deleted once the database acks. On
  #                  startup, leftover files are replayed
  #                  automatically. Cost: one fsync per batch (every
  #                  ~250 ms under load); per-event overhead is
  #                  negligible. Right choice for large servers that
  #                  crash regularly or any audit log where durability
  #                  matters.
  durability = "ram"
  # How long recorded events are kept before automatic deletion. Enforced
  # as a store-level TTL (ClickHouse and Mongo both prune rows older than
  # this), so it bounds disk use and keeps searches fast. "4w" = four
  # weeks. Shorter = less disk and faster scans but a shorter rollback /
  # audit window; longer = more history at the cost of disk.
  retention = "4w"
  # How the per-block rollback audit trail is stored (#22).
  #   "synthesized" (default) — one rollback-op record per operation;
  #       searches compute the per-block rolled-place/rolled-break
  #       entries from it on demand. A 2M-block rollback adds ONE row
  #       instead of two million, and re-running it adds one more row
  #       instead of another two million.
  #   "receipts" — legacy behavior: persist one row per restored block.
  #       Only useful if an external consumer reads rolled-* rows
  #       straight from the database instead of through Spyglass.
  rolled-audit = "synthesized"
  # WARN THRESHOLD — not a drop ceiling. The ingest queue is unbounded
  # (never drops events at intake, same contract as v1). Crossing this
  # depth logs a warning so operators notice Mongo backlog early; depth
  # doublings past it log again so a real outage leaves a growth trail.
  # Sized for ~10× steady-state peak — at MedievalRP's ~600 ev/s that
  # gives ~160 s of slack before the first warning.
  queue-capacity = 100000
  # Shutdown drain deadline. On server stop the recorder keeps retrying to
  # flush any not-yet-stored events for up to this long (with backoff)
  # before giving up; whatever cannot drain in time is counted as lost and
  # logged. Raise it if your store is slow to ack at shutdown. Distinct
  # from limits.rollback-flush-timeout, which waits for the queue to drain
  # BEFORE a rollback runs its query.
  flush-timeout = "5s"
}

defaults {
  # Master toggle for the default search radius below. When true, a search
  # or rollback that omits both r: and -g is scoped to defaults.radius
  # around the sender (with a one-line "defaulting to N blocks" hint). Set
  # false to turn that auto-scoping off entirely.
  enabled = true
  # Default search radius around the sender, applied when neither r: nor -g
  # is on the command line. Set to 0 to default to global (proxy-style)
  # and suppress the "specify range or use -g" reminder.
  radius = 250
  # Default time window when t: is omitted. Always enforced - there's
  # no 0-disable for time, since an unbounded query against a long-lived
  # store can pull tens of millions of rows.
  time = "4h"
}

limits {
  # The hard ceiling on how far a r:<radius> search or rollback reaches
  # from the operator; an r: above it is clamped down to it. This is the
  # practical size bound on a rollback: you can only revert blocks within
  # max-radius of where you stand, so there is no separate "max blocks"
  # cap. A rollback reverts everything its query matches inside this
  # radius and the time window, however many that is; the streaming
  # engine keeps heap flat regardless, so raising this only costs
  # wall-clock on very large reverts, never memory.
  max-radius = 250

  # Max rows a /sg search renders, and the cap on ip: reverse lookups.
  # A display/scan bound only; it does not affect rollback.
  search-result = 1000

  # Max lines one chat-history dump prints at a time.
  chat-dump = 50

  # Main-thread block-replace effects processed per tick before yielding.
  # Simple writes fan out to the off-main worker pool, so this budgets
  # only the main-thread share of a page (tile entities, containers,
  # leftovers, per-batch bookkeeping). 4000/tick stays well under a 50ms
  # tick in the common case. Lower it if you do many tile-entity
  # rollbacks (chests, signs, banners) or see TPS dip during a rollback.
  rollback-batch-size = 4000

  # Cap on the main-thread time the per-tick world-write phase may spend,
  # in milliseconds (50ms is one whole tick). The default 15ms (about 30%
  # of a tick) holds TPS at or near 20 even during a multi-million-block
  # rollback. Raise it for faster wall-clock in a maintenance window, at
  # the cost of TPS while the rollback runs.
  rollback-tick-budget-ms = 15

  # Max time a rollback waits for the recorder queue to drain to the
  # store before it queries. Closes the read-your-writes hole where a
  # fresh burst (e.g. //set 0 over a region) is still queued in the JVM
  # and not yet visible to the store; without it the rollback would miss
  # those blocks and only partially restore the area. On timeout it
  # proceeds anyway and warns the operator that the newest events may be
  # missed.
  rollback-flush-timeout = 30s

  # Removed knobs (a rollback no longer caps the number of blocks it
  # reverts): rollback-result, rollback-page-size, rollback-undo-cap.
  # Any of these left in an old config is ignored. A rollback now always
  # reverts everything its query matches; max-radius above is the bound.
}

tool {
  # The inspector wand. /sg tool gives you (or toggles) a block of this
  # material; clicking a block while holding it shows that block's recent
  # history inline instead of placing or breaking. Any Bukkit Material name.
  material = "GLOWSTONE"
}

server {
  # Identifier for this Spyglass instance, stamped onto every recorded
  # event. When multiple backend servers share a single Mongo / ClickHouse
  # store, this is what lets `srv:lobby` cleanly partition results.
  # Pick a short, stable name per server (lobby / survival / creative /
  # rp). Defaults to "default" so a single-server deployment Just Works.
  name = "default"
}

events {
  # Per-event-type recording toggles and display verbs. enabled = false
  # stops Spyglass recording that event entirely: it won't appear in
  # searches and can't be rolled back. past-tense is the verb shown in
  # results ("Alice broke STONE"). Turning off high-volume events you
  # don't audit (decay, ignite, grow, form) noticeably cuts store size and
  # ingest load; block edits (break / place) are the rollback bread and
  # butter, so leave those on.
  break = { enabled = true, past-tense = "broke" }
  place = { enabled = true, past-tense = "placed" }
  deposit = { enabled = true, past-tense = "deposited" }
  withdraw = { enabled = true, past-tense = "withdrew" }
  open = { enabled = true, past-tense = "opened" }
  close = { enabled = true, past-tense = "closed" }
  shulker-open = { enabled = true, past-tense = "opened" }
  shulker-close = { enabled = true, past-tense = "closed" }
  use = { enabled = true, past-tense = "used" }
  useSign = { enabled = true, past-tense = "activated" }
  say = { enabled = true, past-tense = "said" }
  # redact: command heads whose ARGUMENTS are masked before recording —
  # "/login hunter2" is stored as "/login ***" so auth-plugin passwords
  # never reach the database, the WAL, or a search hover. Heads match
  # case-insensitively, with the leading slash and any "plugin:"
  # namespace ignored ("/authme:login" matches "login"); applies to the
  # player, console, RCON, and command-block paths alike. The head
  # itself still records, so a:command searches keep working. Set
  # redact = [] to record every argument verbatim. If the key is
  # absent (configs from before this option), the default list below
  # applies.
  command = { enabled = true, past-tense = "ran",
    redact = ["login", "register", "l", "reg", "changepassword", "changepw",
              "unregister", "premium", "2fa", "totp", "auth"] }
  join = { enabled = true, past-tense = "joined" }
  quit = { enabled = true, past-tense = "quit" }
  decay = { enabled = true, past-tense = "decayed" }
  form = { enabled = true, past-tense = "formed" }
  grow = { enabled = true, past-tense = "grew" }
  ignite = { enabled = true, past-tense = "ignited" }
  drop = { enabled = true, past-tense = "dropped" }
  pickup = { enabled = true, past-tense = "picked up" }
  clone = { enabled = true, past-tense = "cloned" }
  teleport = { enabled = true, past-tense = "teleported" }
  death = { enabled = true, past-tense = "killed" }
  hit = { enabled = true, past-tense = "hit" }
  shot = { enabled = true, past-tense = "shot" }
  mount = { enabled = true, past-tense = "mounted" }
  dismount = { enabled = true, past-tense = "dismounted" }
  named = { enabled = true, past-tense = "renamed" }
  entity-deposit = { enabled = true, past-tense = "placed on" }
  entity-withdraw = { enabled = true, past-tense = "took from" }
  bookshelf-insert = { enabled = true, past-tense = "shelved" }
  bookshelf-remove = { enabled = true, past-tense = "unshelved" }
  pot-insert = { enabled = true, past-tense = "potted" }
  pot-remove = { enabled = true, past-tense = "unpotted" }
  shulker-deposit = { enabled = true, past-tense = "deposited" }
  shulker-withdraw = { enabled = true, past-tense = "withdrew" }
  bundle-insert = { enabled = true, past-tense = "bundled" }
  bundle-extract = { enabled = true, past-tense = "unbundled" }
  brush = { enabled = true, past-tense = "brushed" }
  sculk = { enabled = true, past-tense = "triggered" }
  crafter = { enabled = true, past-tense = "crafted" }
  vault = { enabled = true, past-tense = "unlocked" }
  # Per-block rollback audit trail ("ROLLBACK placed/broke X" in the
  # wand and a:rolled-place searches). With storage.rolled-audit =
  # "synthesized" (the default) these entries are computed at search
  # time from rollback-op records and these toggles only control their
  # visibility; with "receipts" they are persisted rows again.
  rolled-place = { enabled = true, past-tense = "placed" }
  rolled-break = { enabled = true, past-tense = "broke" }
  # One record per completed rollback / restore / undo operation: the
  # operator, mode, and the operation's resolved query + bounding box.
  # This is what the per-block entries above are synthesized from —
  # leave enabled.
  rollback-op = { enabled = true, past-tense = "ran" }
  # Emitted when an operator extracts an item from a rollback-salvage
  # snapshot via /sg inventory (#76).
  salvage-withdraw = { enabled = true, past-tense = "took" }
}
