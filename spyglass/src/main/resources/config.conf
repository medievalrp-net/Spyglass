# Config version - do not edit.
config-version = 4

database {
  # Storage backend; only the matching settings below are read, the rest are
  # ignored.
  #   "sqlite"     - embedded file, zero setup. Default; right for most servers.
  #   "mariadb"    - MariaDB / MySQL ("mysql" selects the same backend), for a
  #                  host already running one.
  #   "mongo"      - MongoDB.
  #   "clickhouse" - columnar; recommended for large servers, best compression
  #                  and rollback speed at scale.
  backend = "sqlite"

  mongo {
    host = "localhost"
    port = 27017
    database = "Spyglass"
    user = ""
    password = ""
    ssl = false
    collection = "EventRecords"
    # Optional: a full connection string for a replica set, Atlas
    # (mongodb+srv), or advanced TLS. When set it overrides the fields above.
    uri = ""
  }

  sqlite {
    path = "spyglass.db"
  }

  mariadb {
    host = "localhost"
    port = 3306
    database = "spyglass"
    user = "root"
    password = ""
    ssl = false
  }

  clickhouse {
    host = "localhost"
    port = 8123
    database = "spyglass"
    table = "event_records"
    user = "default"
    password = ""
    ssl = false
  }
}

storage {
  # Queue depth that logs a "drain falling behind" warning (not a ceiling;
  # doublings past it log again). Sized ~10x steady-state peak.
  queue-capacity = 100000

  # Hard ceiling on the in-memory queue. Past it, bulk edits (WorldEdit/FAWE)
  # spill to disk instead of buffering in RAM. ~400 bytes/record, so 500000 is
  # roughly 200 MiB. 0 removes the ceiling (a large edit can then OOM). Keep it
  # above queue-capacity.
  queue-max = 500000

  # Spill records past queue-max to plugins/Spyglass/spill/ and replay them as
  # the database catches up - flat heap for an edit of any size, nothing lost.
  # With this off, over-ceiling overflow buffers in RAM instead. Keep the data
  # folder on a fast local disk.
  spill-to-disk = true

  # Background spill replay rate, records/sec. Gentle default so reclaiming a
  # backlog never saturates a live database; raise (0 = unlimited) to recover
  # faster in a maintenance window. Spilled records are not searchable or
  # rollbackable until replayed - watch the backlog with /spyglass stats.
  spill-drain-rate = 20000

  # On server stop, keep retrying to flush unstored events for up to this long
  # before counting them lost. Distinct from limits.rollback-flush-timeout.
  flush-timeout = "5s"

  # Default retention: how long events are kept before automatic deletion.
  # Units s/m/h/d/w; "0" / "never" keeps everything forever. This is the
  # fallback - a per-event `retention` in the events block below overrides it
  # for that event type.
  retention = "26w"

  # Removed knobs, ignored if present: durability (the wal-batched mode is
  # gone; the queue is in-RAM only, with spill-to-disk covering bulk edits),
  # rolled-audit (the audit trail is always synthesized from rollback-op
  # records; the receipts mode is gone).
}

events {
  # One entry per event type.
  #   enabled     - false stops recording it entirely (not searchable, not
  #                 rollbackable). Disabling high-volume types you don't audit
  #                 (decay, form, grow, ignite) cuts store size and ingest load.
  #   past-tense  - the verb shown in results ("Alice broke STONE").
  #   retention   - optional; keeps THIS type for a different span than
  #                 storage.retention above, e.g. retention = "3d". "0"/"never"
  #                 = forever. Omit to inherit the global default. Expiry is
  #                 stamped at write time, so a change applies to new records
  #                 (the SQL backends also re-evaluate old rows on prune).
  break = { enabled = true, past-tense = "broke" }
  place = { enabled = true, past-tense = "placed" }
  deposit = { enabled = true, past-tense = "deposited" }
  withdraw = { enabled = true, past-tense = "withdrew" }
  open = { enabled = true, past-tense = "opened" }
  close = { enabled = true, past-tense = "closed" }
  shulker-open = { enabled = true, past-tense = "opened" }
  shulker-close = { enabled = true, past-tense = "closed" }
  use = { enabled = true, past-tense = "used" }
  useSign = { enabled = true, past-tense = "activated" }
  say = { enabled = true, past-tense = "said" }
  # redact: command heads whose arguments are masked before recording, so
  # "/login hunter2" stores as "/login ***". Case-insensitive, "plugin:"
  # namespaces ignored; applies to player, console, RCON, and command blocks.
  # The head still records, so a:command searches keep working. redact = []
  # records everything verbatim.
  command = { enabled = true, past-tense = "ran",
    redact = ["login", "register", "l", "reg", "changepassword", "changepw",
              "unregister", "premium", "2fa", "totp", "auth"] }
  join = { enabled = true, past-tense = "joined" }
  quit = { enabled = true, past-tense = "quit" }
  decay = { enabled = true, past-tense = "decayed" }
  form = { enabled = true, past-tense = "formed" }
  grow = { enabled = true, past-tense = "grew" }
  ignite = { enabled = true, past-tense = "ignited" }
  drop = { enabled = true, past-tense = "dropped" }
  pickup = { enabled = true, past-tense = "picked up" }
  clone = { enabled = true, past-tense = "cloned" }
  # Automated container-to-container movement via hopper / dropper / dispenser:
  # transfer-out logs on the source, transfer-in on the destination. Repeated
  # identical moves collapse to one record per ~30s so farms don't flood the store.
  transfer-out = { enabled = true, past-tense = "piped out" }
  transfer-in = { enabled = true, past-tense = "piped in" }
  # Fluid poured / scooped with a bucket. Rollbackable: a rollback removes
  # poured fluid and restores a scooped source. (Powder-snow buckets place a
  # block, so those log as `place`.)
  bucket-empty = { enabled = true, past-tense = "poured" }
  bucket-fill = { enabled = true, past-tense = "scooped" }
  teleport = { enabled = true, past-tense = "teleported" }
  death = { enabled = true, past-tense = "died" }
  kill = { enabled = true, past-tense = "killed" }
  mob-kill = { enabled = true, past-tense = "killed" }
  hit = { enabled = true, past-tense = "hit" }
  shot = { enabled = true, past-tense = "shot" }
  mount = { enabled = true, past-tense = "mounted" }
  dismount = { enabled = true, past-tense = "dismounted" }
  named = { enabled = true, past-tense = "renamed" }
  entity-deposit = { enabled = true, past-tense = "placed on" }
  entity-withdraw = { enabled = true, past-tense = "took from" }
  bookshelf-insert = { enabled = true, past-tense = "shelved" }
  bookshelf-remove = { enabled = true, past-tense = "unshelved" }
  pot-insert = { enabled = true, past-tense = "potted" }
  pot-remove = { enabled = true, past-tense = "unpotted" }
  shulker-deposit = { enabled = true, past-tense = "deposited" }
  shulker-withdraw = { enabled = true, past-tense = "withdrew" }
  bundle-insert = { enabled = true, past-tense = "bundled" }
  bundle-extract = { enabled = true, past-tense = "unbundled" }
  brush = { enabled = true, past-tense = "brushed" }
  sculk = { enabled = true, past-tense = "triggered" }
  crafter = { enabled = true, past-tense = "crafted" }
  vault = { enabled = true, past-tense = "unlocked" }
  # Rollback audit trail: what a rollback placed/broke and which container
  # stacks it cleared or repopulated. These are computed at search time from
  # the rollback-op record below; the toggles only control visibility.
  rolled-place = { enabled = true, past-tense = "placed" }
  rolled-break = { enabled = true, past-tense = "broke" }
  rolled-deposit = { enabled = true, past-tense = "deposited" }
  rolled-withdraw = { enabled = true, past-tense = "withdrew" }
  # One record per completed rollback / restore / undo: operator, mode, and the
  # resolved query. The rolled-* entries above are synthesized from it - leave on.
  rollback-op = { enabled = true, past-tense = "ran" }
  # An operator extracting an item from rollback salvage via /sg inventory.
  salvage-withdraw = { enabled = true, past-tense = "took" }
}

defaults {
  # Auto-scope searches/rollbacks that omit both r: and -g to `radius` blocks
  # around the sender (with a one-line hint). false = require r: or -g.
  enabled = true
  # The radius used by that auto-scoping. 0 = default to global.
  radius = 250
  # Time window when t: is omitted. Always enforced; an unbounded query
  # against a long-lived store could pull tens of millions of rows.
  time = "4h"
}

limits {
  # Hard ceiling on r:<radius>; larger values clamp down to it. A rollback
  # reverts everything its query matches inside the radius and time window.
  max-radius = 500

  # Max rows a /sg search renders, and the cap on ip: reverse lookups.
  # Display-only; does not affect rollback.
  search-result = 5000

  # Max lines one chat-history dump prints at a time.
  chat-dump = 50

  # Main-thread block effects processed per tick before yielding. Lower it if
  # you see TPS dip during tile-entity-heavy rollbacks (chests, signs).
  rollback-batch-size = 4000

  # Cap on main-thread world-write time per tick, ms (a full tick is 50).
  # The default ~30% of a tick holds TPS near 20 during huge rollbacks;
  # raise for faster wall-clock in a maintenance window.
  rollback-tick-budget-ms = 15

  # Max wait for the recorder to drain to the store before a rollback queries,
  # so just-recorded edits are visible to it. On timeout it proceeds and warns.
  rollback-flush-timeout = 30s

  # Removed knobs, ignored if present: rollback-result, rollback-page-size,
  # rollback-undo-cap.
}

tool {
  # The inspector wand: /sg tool gives (or toggles) a block of this material;
  # clicking with it shows the block's history instead of placing/breaking.
  material = "REDSTONE_LAMP"

  # How far back a wand inspect looks. A cheap point query - match it to
  # storage.retention if the wand should see everything Spyglass holds.
  lookback = "26w"
}

commands {
  # Register /s as a root alias next to /spyglass and /sg. Set false if
  # another plugin claims /s.
  s-alias = true
}

server {
  # Name stamped onto every event from this instance. Only matters when
  # several servers share one store: it is what srv:lobby filters on.
  name = "default"
}

metrics {
  # Anonymous usage stats via bStats (https://bstats.org): server version,
  # player-count bucket, Java version, storage backend. Never world data,
  # player names, IPs, or recorded events. false = opt out.
  enabled = true
}

analytics {
  # Local ingest counters for tuning: events/sec by type, queue depth, store
  # throughput, drops. Logged every `interval` and shown by /spyglass stats.
  # Off = zero overhead. Nothing leaves the server (that is `metrics`).
  enabled = false
  interval = "60s"  # floored at 5s
}
